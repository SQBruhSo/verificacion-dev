<!DOCTYPE html>
<html>
<head>
    <title>Verificación de Desarrolladores</title>
    <style>
        body { background: #1e1e2f; color: white; font-family: sans-serif; text-align: center; }
        .box { margin-top: 50px; padding: 20px; border: 2px solid #5865f2; display: inline-block; border-radius: 10px; }
        input { display: block; margin: 10px auto; padding: 8px; border-radius: 5px; border: none; }
        button { background: #5865f2; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Acceso al Servidor de Desarrollo</h2>
        <input type="text" id="discord_user" placeholder="Tu Usuario de Discord (Nombre#0000)">
        <input type="password" id="secret_code" placeholder="Código de Acceso">
        <button onclick="enviarAcceso()">Verificar y Entrar</button>
    </div>

    <script>
        function enviarAcceso() {
            const user = document.getElementById('discord_user').value;
            const code = document.getElementById('secret_code').value;
            const miCodigo = "QWERTY"; // EL CÓDIGO QUE TÚ ELIGES

            if (code === miCodigo) {
                // ESTO ENVÍA EL COMANDO A DISCORD
                fetch('https://discord.com/api/webhooks/1486827589736726794/kgNcN5bdN02KYqwFWNZzt8nfPlw9xkCSRyU15rb2EadxMwglI8PWjMYNmdTlwaGa3ngB', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `!temp ${user} 24h Acceso-Verificado`
                    })
                }).then(() => alert("¡Solicitud enviada! Revisa Discord."));
            } else {
                alert("Código incorrecto.");
            }
        }
    </script>
</body>
</html>
