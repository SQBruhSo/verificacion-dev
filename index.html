<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lucky Combats - Dev Terminal</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #30363d; padding: 40px; border-radius: 12px; background: #161b22; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 350px; }
        h1 { color: #f0f6fc; font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #8b949e; font-size: 0.9rem; margin-bottom: 25px; }
        input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 12px; width: 90%; margin-bottom: 15px; border-radius: 6px; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

<div class="card">
    <h1>LUCKY COMBATS</h1>
    <p>Developer Identification Terminal</p>
    <input type="text" id="discordID" placeholder="Tu ID de Discord (ej: 1234567890)">
    <input type="password" id="devCode" placeholder="Código Secreto">
    <button onclick="verificar()">SOLICITAR ROL</button>
    <div id="msg" style="margin-top:15px; font-size: 0.8rem;"></div>
</div>

<script>
    // BASE DE DATOS: ID DE DISCORD + CÓDIGO + ROL
    const devs = {
        "m0zzz_xd": { code: "LC_admin01", rol: "Admin" },
        "sqbruhso": { code: "LC_owner01", rol: "Owner" }
    };

    async function verificar() {
        const user = document.getElementById('discordID').value.trim();
        const code = document.getElementById('devCode').value.trim();
        const msg = document.getElementById('msg');

        if (devs[user] && devs[user].code === code) {
            msg.innerText = "Enviando comando a Dyno...";
            msg.style.color = "#3fb950";
            
            // EL TRUCO: Enviamos el comando de TEXTO que Dyno SÍ lee
            await fetch("https://discord.com/api/webhooks/1486827589736726794/kgNcN5bdN02KYqwFWNZzt8nfPlw9xkCSRyU15rb2EadxMwglI8PWjMYNmdTlwaGa3ngB", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `?temprole ${user} 24h ${devs[user].rol}` 
                })
            });

            alert("¡Listo! Si Dyno tiene permisos, ya tienes tu rol.");
        } else {
            msg.innerText = "Error: Credenciales no coinciden.";
            msg.style.color = "#f85149";
        }
    }
</script>
</body>
</html>
